# 새 프로젝트용 docker-compose.yml 초안
# 사용법: cp .env.example .env  →  docker compose up -d
#
# 주의: 아래 ${POSTGRES_PASSWORD:-root} 등의 기본값은 로컬 개발 편의를 위한 예시일 뿐이다.
# 서버(OCI 등)에 배포할 땐 반드시 .env에 실제 값(POSTGRES_PASSWORD, JWT_SECRET 등)을 채워서
# 이 기본값이 그대로 쓰이지 않게 할 것.
services:
  db:
    image: postgres:17
    container_name: workflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: workflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0   # KRaft 모드 내장 — zookeeper 불필요
    container_name: workflow-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  backend-spring:
    build: ./backend_spring
    container_name: workflow-backend-spring
    environment:
      DB_HOST: db                          # application.properties에서 이 이름으로 참조
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092   # KafkaConfig.java의 실제 프로퍼티 키에 맞춰 이름 조정
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      WORKFLOW_AI_FASTAPI_URL: http://backend-fastapi:8000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  backend-fastapi:
    build:
      # Dockerfile이 App/backend_fastapi/app 소스도 함께 COPY하므로 빌드 컨텍스트를 루트로 잡는다
      context: ..
      dockerfile: App/backend_fastapi/Dockerfile
    container_name: workflow-backend-fastapi
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-root}@db:5432/${POSTGRES_DB:-workflow}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: workflow-frontend
    environment:
      API_PROXY_TARGET: http://backend-spring:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app        # 호스트 코드 수정 → 컨테이너에 바로 반영 (HMR)
      - /app/node_modules      # 컨테이너 안의 node_modules를 위 마운트가 안 덮도록 보호
    depends_on:
      - backend-spring

volumes:
  db-data:
