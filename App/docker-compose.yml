# 새 프로젝트용 docker-compose.yml 초안
# 사용법: cp .env.example .env  →  docker compose up -d
#
# 주의: 아래 ${POSTGRES_PASSWORD:-root} 등의 기본값은 로컬 개발 편의를 위한 예시일 뿐이다.
# 서버(OCI 등)에 배포할 땐 반드시 .env에 실제 값(POSTGRES_PASSWORD, JWT_SECRET 등)을 채워서
# 이 기본값이 그대로 쓰이지 않게 할 것.
services:
  db:
    image: postgres:17
    container_name: workflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
    ports:
      - '${DB_HOST_PORT:-5432}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
      # 최초 기동(볼륨이 비어있을 때)에만 자동 실행되는 스키마 초기화 스크립트.
      # backend_spring/src/main/resources/db/init 참고.
      - ./backend_spring/src/main/resources/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: workflow-redis
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - noeviction
      - --auto-aof-rewrite-percentage
      - '50'
      - --auto-aof-rewrite-min-size
      - 16mb
    ports:
      - '127.0.0.1:${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0 # KRaft 모드 내장 — zookeeper 불필요
    container_name: workflow-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - '9092:9092'

  backend-spring:
    build: ./backend_spring
    container_name: workflow-backend-spring
    environment:
      DB_HOST: db # application.properties에서 이 이름으로 참조
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092 # KafkaConfig.java의 실제 프로퍼티 키에 맞춰 이름 조정
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root}
      # 기본은 compose 안의 로컬 db 서비스에 연결한다.
      # Supabase(원격)에 직접 연결하려면 .env의 SPRING_DATASOURCE_* 값으로 덮어쓴다.
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/workflow}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-root}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-20260721.1}
      WORKFLOW_AI_FASTAPI_URL: http://backend-fastapi:8000
      RAG_INTERNAL_API_KEY: ${RAG_INTERNAL_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/google/callback}
      WORKFLOW_FRONTEND_BASE_URL: ${WORKFLOW_FRONTEND_BASE_URL:-http://localhost:5173}
      WORKFLOW_DEMO_DEV_LOGIN_ENABLED: ${WORKFLOW_DEMO_DEV_LOGIN_ENABLED:-false}
      WORKFLOW_DEMO_SEED_ENABLED: ${WORKFLOW_DEMO_SEED_ENABLED:-true}
      SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:-4}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-task-results}
    ports:
      - '8080:8080'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  backend-fastapi:
    build:
      # Dockerfile이 App/backend_fastapi/app 소스도 함께 COPY하므로 빌드 컨텍스트를 루트로 잡는다
      context: ..
      dockerfile: App/backend_fastapi/Dockerfile
    container_name: workflow-backend-fastapi
    environment:
      # 기본은 backend-spring과 동일하게 compose 안의 로컬 db 서비스에 연결한다.
      # 컨테이너 안에서는 "localhost"가 컨테이너 자기 자신을 가리키므로, 로컬 개발용 .env에
      # DATABASE_URL=postgresql://...@localhost:5432/workflow처럼 host 실행 기준 값을 넣어뒀다면
      # ml_workload_score 등 FastAPI DB 조회가 전부 연결 실패로 죽는다(2026-07-24 실측).
      # Supabase(원격)에 직접 연결하려면 .env의 DATABASE_URL 값으로 이 기본값을 덮어쓴다.
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:root@db:5432/workflow}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Spring(RagController) 외의 직접 호출로부터 /ai/rag/* 를 보호하는 서비스 간 공유 시크릿.
      # backend-spring과 반드시 같은 값이어야 한다 (llm_rag_assistant/app/security.py 참고).
      RAG_INTERNAL_API_KEY: ${RAG_INTERNAL_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      GENERATION_MODEL: ${GENERATION_MODEL:-gemma2}
      # RAG 챗봇 임베딩 모델 (embedding_service.py, 컨테이너 내부 로컬 추론)
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-rhantj/bge-m3-workflow-query-robust}
      # 위 모델의 커밋 revision 고정 (재현성 - 원격 저장소 갱신에 배포가 조용히 끌려가지 않게)
      HF_EMBEDDING_MODEL_REVISION: ${HF_EMBEDDING_MODEL_REVISION:-dc328732ab2c3330d38305199e26b2d060586af3}
      # 회의록 AI 분석 전용 (RAG Assistant의 GENERATION_MODEL과 분리)
      MEETING_ANALYSIS_PROVIDER: ${MEETING_ANALYSIS_PROVIDER:-auto}
      MEETING_ANALYSIS_MODEL: ${MEETING_ANALYSIS_MODEL:-qwen2.5:1.5b}
      MEETING_ANALYSIS_TIMEOUT_SECONDS: ${MEETING_ANALYSIS_TIMEOUT_SECONDS:-20}
      MEETING_ANALYSIS_MAX_CHARS: ${MEETING_ANALYSIS_MAX_CHARS:-6000}
      MEETING_ANALYSIS_NUM_PREDICT: ${MEETING_ANALYSIS_NUM_PREDICT:-650}
      MEETING_ANALYSIS_KEEP_ALIVE: ${MEETING_ANALYSIS_KEEP_ALIVE:-5m}
      OLLAMA_ANALYSIS_TEMPERATURE: ${OLLAMA_ANALYSIS_TEMPERATURE:-0.1}
      # FS-3 지연 위험도 모델(.pkl)을 Hugging Face Hub에서 내려받기 위한 설정 (docker-entrypoint.sh 참고)
      DELAY_RISK_HF_MODEL_REPO_ID: ${DELAY_RISK_HF_MODEL_REPO_ID:-}
      DELAY_RISK_HF_MODEL_REVISION: ${DELAY_RISK_HF_MODEL_REVISION:-}
      DELAY_RISK_HF_MODEL_SHA256: ${DELAY_RISK_HF_MODEL_SHA256:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN}
      HF_MEETING_ANALYSIS_MODEL: ${HF_MEETING_ANALYSIS_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
      HF_MEETING_ANALYSIS_ENDPOINT: ${HF_MEETING_ANALYSIS_ENDPOINT:-https://router.huggingface.co/v1/chat/completions}
      HF_MEETING_ANALYSIS_TIMEOUT_SECONDS: ${HF_MEETING_ANALYSIS_TIMEOUT_SECONDS:-35}
      HF_MEETING_ANALYSIS_MAX_TOKENS: ${HF_MEETING_ANALYSIS_MAX_TOKENS:-900}
      HF_MEETING_ANALYSIS_TEMPERATURE: ${HF_MEETING_ANALYSIS_TEMPERATURE:-0.1}
      # LangSmith 트레이싱 (RAG 챗봇 langchain-huggingface ChatHuggingFace 실행 관찰용)
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ENABLE_DEMO_AUTH: ${VITE_ENABLE_DEMO_AUTH:-true}
    container_name: workflow-frontend
    environment:
      API_PROXY_TARGET: http://backend-spring:8080
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app # 호스트 코드 수정 → 컨테이너에 바로 반영 (HMR)
      - /app/node_modules # 컨테이너 안의 node_modules를 위 마운트가 안 덮도록 보호
    depends_on:
      - backend-spring

volumes:
  db-data:
  redis-data:
