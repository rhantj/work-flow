packages:
  - '.'
supportedArchitectures:
  os:
    - linux
    - win32
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
allowBuilds:
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
