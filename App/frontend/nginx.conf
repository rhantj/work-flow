server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 백엔드의 spring.servlet.multipart.max-request-size(application.yml, 120MB)와 맞춘다.
    # 이게 없으면 nginx 기본값(1MB)에서 먼저 잘려서 그보다 작은 업로드도 413으로 실패한다.
    client_max_body_size 120M;

    resolver 127.0.0.11 valid=10s;

    location /api/ {
        set $backend_upstream backend-spring:8080;
        # proxy_pass 호스트가 변수라 location 접두사 자동 치환이 꺼짐 — $request_uri로 원본 경로를 직접 붙여야 함
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # index.html은 배포마다 새 자산 해시를 참조하므로 캐시되면 안 됨(캐시되면 새로고침 전까지 옛 화면이 보임).
    # 해시가 붙은 /assets/*.js, *.css는 이 지시 없이도 브라우저가 안전하게 오래 캐시해도 된다.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    location / {
        try_files $uri /index.html;
    }
}
