server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # 리버스 프록시가 TLS를 종료하고 X-Forwarded-Proto로 넘겨주는 배포 환경에서
  # HttpServletRequest.isSecure()/getScheme()이 프록시 뒤의 백엔드 자체 프로토콜(대개 http)이 아니라
  # 실제 클라이언트-프록시 간 프로토콜을 반영하도록 한다 (OAuth state 쿠키의 Secure 속성 판단에 사용).
  #
  # 기본값 native는 내장 톰캣의 RemoteIpValve를 사용해, 실제 TCP 연결이 내부망 대역(10/8, 172.16/12,
  # 192.168/16, 127.0.0.1 등 tomcat.remoteip.internal-proxies 기본값)에서 온 경우에만 X-Forwarded-*
  # 헤더를 신뢰하고 그 외에는 무시한다 (외부 클라이언트의 헤더 위조 방지).
  # docker-compose.prod.yml의 nginx처럼 프록시가 그 대역 밖에 있거나 native로도 OAuth 리다이렉트가
  # http://로 깨지는 배포라면 SERVER_FORWARD_HEADERS_STRATEGY=framework로 override한다 — framework는
  # X-Forwarded-*를 무조건 신뢰하므로, 그 경우엔 반드시 신뢰 가능한 리버스 프록시 뒤에서만 노출할 것.
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:native}

spring:
  application:
    name: workflow-ai-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      data-source-properties:
        # Supabase Supavisor(pgbouncer) 트랜잭션 풀러(6543)는 커넥션마다 다른
        # 물리 세션을 재사용하므로, PgJDBC 서버사이드 prepared statement 캐시를
        # 켜두면 이름이 충돌해 "prepared statement already exists" 에러가 난다.
        prepareThreshold: 0
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

workflow:
  ai:
    base-url: ${WORKFLOW_AI_FASTAPI_URL:http://localhost:8000}
  cors:
    allowed-origins: ${WORKFLOW_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
  frontend:
    base-url: ${WORKFLOW_FRONTEND_BASE_URL:http://localhost:5173}
  security:
    # request.isSecure()는 tomcat.remoteip.internal-proxies에 해당하는(기본: 사설 대역) 프록시를
    # 통해 왔을 때만 X-Forwarded-Proto를 신뢰한다. 프록시가 그 대역 밖(예: 퍼블릭 IP 클라우드
    # 로드밸런서)에 있어 isSecure()가 항상 false로 나오는 배포라면, IP 대역을 알아내 맞추는 대신
    # 이 값을 true로 켜서 OAuth state 쿠키에 Secure 속성을 강제로 붙인다.
    force-secure-cookies: ${WORKFLOW_FORCE_SECURE_COOKIES:false}
  demo:
    seed-enabled: ${WORKFLOW_DEMO_SEED_ENABLED:true}
    dev-login-enabled: ${WORKFLOW_DEMO_DEV_LOGIN_ENABLED:true}
  uploads:
    dir: ${WORKFLOW_UPLOADS_DIR:uploads}
