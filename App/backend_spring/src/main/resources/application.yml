server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # 리버스 프록시가 TLS를 종료하고 X-Forwarded-Proto로 넘겨주는 배포 환경에서
  # HttpServletRequest.isSecure()/getScheme()이 프록시 뒤의 백엔드 자체 프로토콜(대개 http)이 아니라
  # 실제 클라이언트-프록시 간 프로토콜을 반영하도록 한다 (OAuth state 쿠키의 Secure 속성 판단에 사용).
  #
  # forward-headers-strategy는 반드시 native로 둘 것 — framework는 X-Forwarded-* 헤더를 무조건 신뢰해
  # 외부 클라이언트가 직접 이 헤더를 위조해 isSecure() 판단을 속일 수 있다. native는 내장 톰캣의
  # RemoteIpValve를 사용해, 실제 TCP 연결이 내부망 대역(10/8, 172.16/12, 192.168/16, 127.0.0.1 등
  # tomcat.remoteip.internal-proxies 기본값)에서 온 경우에만 해당 헤더를 신뢰하고 그 외에는 무시한다.
  # 프록시가 이 대역 밖의 IP(예: 퍼블릭 IP를 쓰는 클라우드 로드밸런서)라면 배포 시
  # SERVER_TOMCAT_REMOTEIP_INTERNAL_PROXIES 환경변수로 그 대역을 명시적으로 지정해야 한다.
  forward-headers-strategy: native

spring:
  application:
    name: workflow-ai-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

workflow:
  ai:
    base-url: ${WORKFLOW_AI_FASTAPI_URL:http://localhost:8000}
  cors:
    allowed-origins: ${WORKFLOW_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
  frontend:
    base-url: ${WORKFLOW_FRONTEND_BASE_URL:http://localhost:5173}
  demo:
    seed-enabled: ${WORKFLOW_DEMO_SEED_ENABLED:true}
  uploads:
    dir: ${WORKFLOW_UPLOADS_DIR:uploads}
