server:
  port: ${PORT:8080}
  address: 0.0.0.0
  # 리버스 프록시가 TLS를 종료하고 X-Forwarded-Proto로 넘겨주는 배포 환경에서
  # HttpServletRequest.isSecure()/getScheme()이 프록시 뒤의 백엔드 자체 프로토콜(대개 http)이 아니라
  # 실제 클라이언트-프록시 간 프로토콜을 반영하도록 한다 (OAuth state 쿠키의 Secure 속성 판단에 사용).
  #
  # 기본값 native는 내장 톰캣의 RemoteIpValve를 사용해, 실제 TCP 연결이 내부망 대역(10/8, 172.16/12,
  # 192.168/16, 127.0.0.1 등 tomcat.remoteip.internal-proxies 기본값)에서 온 경우에만 X-Forwarded-*
  # 헤더를 신뢰하고 그 외에는 무시한다 (외부 클라이언트의 헤더 위조 방지).
  # docker-compose.prod.yml의 nginx처럼 프록시가 그 대역 밖에 있거나 native로도 OAuth 리다이렉트가
  # http://로 깨지는 배포라면 SERVER_FORWARD_HEADERS_STRATEGY=framework로 override한다 — framework는
  # X-Forwarded-*를 무조건 신뢰하므로, 그 경우엔 반드시 신뢰 가능한 리버스 프록시 뒤에서만 노출할 것.
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:native}

spring:
  application:
    name: workflow-ai-backend
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      # Supabase 무료/저가 플랜 pooler는 세션 모드 동시 접속이 15개로 제한된다.
      # 기본값(10)은 인스턴스 하나만 떠도 대부분을 차지해버려서 다른 클라이언트(SQL 콘솔 등)가
      # 붙지 못하는 문제가 반복됐다 — 넉넉히 남기도록 작게 유지한다.
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:4}
      data-source-properties:
        # Supabase Supavisor(pgbouncer) 트랜잭션 풀러(6543)는 커넥션마다 다른
        # 물리 세션을 재사용하므로, PgJDBC 서버사이드 prepared statement 캐시를
        # 켜두면 이름이 충돌해 "prepared statement already exists" 에러가 난다.
        prepareThreshold: 0
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    # Flyway는 기본 활성화다. 기존 DB에서는 schema_history 부재로 기동 실패하지 않게 baseline을 기본 허용한다.
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    # baseline-on-migrate=true만으로는 "기존 DB=최신 상태"가 보장되지 않는다 — baseline-version을
    # 명시하지 않으면 Flyway 기본값(1)이 쓰이는데, db/migration에 이미 있는 V20260721_1은 그보다
    # 버전이 높아 "아직 미적용"으로 간주돼 baseline 직후 실제로 실행돼 버린다. 그 SQL 자체는
    # ADD COLUMN IF NOT EXISTS 등으로 idempotent하게 짜여 있지만, 검증되지 않은 운영 DB의 실제
    # 상태(예: 같은 컬럼이 다른 타입/제약으로 이미 존재)와 충돌하면 기동 실패로 이어질 수 있다.
    # baseline-version을 Flyway 도입 시점에 저장소에 있던 마이그레이션 버전으로 명시적으로
    # 고정해, 그 이하 버전은 전부 "이미 처리된 이력"으로 취급하고 baseline 시점에 실행하지
    # 않게 한다. 이 값은 한 번 정하면 그대로 영구 고정한다 — 절대 새 마이그레이션 버전으로
    # 따라 올리면 안 된다. 새 마이그레이션은 이 고정값보다 버전이 높기만 하면, Flyway를 언제
    # 켰든(오늘 막 켠 DB든 예전부터 켜져 있던 DB든) 정상적으로 한 번 적용된다 — baseline-version을
    # 새 마이그레이션 버전으로 올려버리면 그 마이그레이션 자체가 "baseline 이하 = 이미 적용됨"으로
    # 오분류돼 건너뛰어지고, 그 결과 스키마 누락과 애플리케이션 기동 실패(JPA validate 불일치)로
    # 이어진다. FlywayBaselineStrategyTest가 이 두 시나리오(고정 baseline은 새 마이그레이션을
    # 정상 적용, baseline을 새 버전으로 올리면 그 마이그레이션이 스킵됨)를 직접 검증한다.
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:20260721_1}
    locations: classpath:db/migration

workflow:
  ai:
    base-url: ${WORKFLOW_AI_FASTAPI_URL:http://localhost:8000}
    connect-timeout-seconds: ${WORKFLOW_AI_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${WORKFLOW_AI_READ_TIMEOUT_SECONDS:45}
    internal-key: ${RAG_INTERNAL_API_KEY}
  cors:
    allowed-origins: ${WORKFLOW_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
  frontend:
    base-url: ${WORKFLOW_FRONTEND_BASE_URL:http://localhost:5173}
  security:
    # request.isSecure()는 tomcat.remoteip.internal-proxies에 해당하는(기본: 사설 대역) 프록시를
    # 통해 왔을 때만 X-Forwarded-Proto를 신뢰한다. 프록시가 그 대역 밖(예: 퍼블릭 IP 클라우드
    # 로드밸런서)에 있어 isSecure()가 항상 false로 나오는 배포라면, IP 대역을 알아내 맞추는 대신
    # 이 값을 true로 켜서 OAuth state 쿠키에 Secure 속성을 강제로 붙인다.
    force-secure-cookies: ${WORKFLOW_FORCE_SECURE_COOKIES:false}
  demo:
    seed-enabled: ${WORKFLOW_DEMO_SEED_ENABLED:true}
    dev-login-enabled: ${WORKFLOW_DEMO_DEV_LOGIN_ENABLED:false}
  uploads:
    dir: ${WORKFLOW_UPLOADS_DIR:uploads}
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:task-results}
