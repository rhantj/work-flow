server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: workflow-ai-backend
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/workflow}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      data-source-properties:
        # Supabase Supavisor(pgbouncer) 트랜잭션 풀러(6543)는 커넥션마다 다른
        # 물리 세션을 재사용하므로, PgJDBC 서버사이드 prepared statement 캐시를
        # 켜두면 이름이 충돌해 "prepared statement already exists" 에러가 난다.
        prepareThreshold: 0
  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

workflow:
  ai:
    base-url: ${WORKFLOW_AI_FASTAPI_URL:http://localhost:8000}
  cors:
    allowed-origins: ${WORKFLOW_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}
  frontend:
    base-url: ${WORKFLOW_FRONTEND_BASE_URL:http://localhost:5173}
  demo:
    seed-enabled: ${WORKFLOW_DEMO_SEED_ENABLED:true}
    dev-login-enabled: ${WORKFLOW_DEMO_DEV_LOGIN_ENABLED:true}
  uploads:
    dir: ${WORKFLOW_UPLOADS_DIR:uploads}
