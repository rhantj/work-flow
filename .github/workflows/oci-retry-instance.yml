name: OCI - retry Always Free instance creation

on:
  schedule:
    # 10분마다 재시도 (GitHub Actions cron은 정확한 시각을 보장하지 않음)
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  retry-launch:
    runs-on: ubuntu-latest
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
      OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
      INSTANCE_DISPLAY_NAME: workflow-ai-oci
      SHAPE: VM.Standard.A1.Flex
      OCPUS: 4
      MEMORY_GBS: 24
    steps:
      - name: Install OCI CLI
        run: pip install --upgrade oci-cli

      - name: Skip if instance already exists
        id: check
        run: |
          set -e
          EXISTING=$(oci compute instance list \
            --compartment-id "$OCI_CLI_TENANCY" \
            --display-name "$INSTANCE_DISPLAY_NAME" \
            --lifecycle-state RUNNING \
            --query 'data[0].id' --raw-output 2>/dev/null || true)
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Instance already running: $EXISTING"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Look up availability domain
        if: steps.check.outputs.skip == 'false'
        id: ad
        run: |
          set -e
          AD=$(oci iam availability-domain list \
            --compartment-id "$OCI_CLI_TENANCY" \
            --query 'data[0].name' --raw-output)
          echo "name=$AD" >> "$GITHUB_OUTPUT"

      - name: Look up latest Ubuntu 24.04 ARM image
        if: steps.check.outputs.skip == 'false'
        id: image
        run: |
          set -e
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$OCI_CLI_TENANCY" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "24.04" \
            --shape "$SHAPE" \
            --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output)
          echo "id=$IMAGE_ID" >> "$GITHUB_OUTPUT"

      - name: Attempt instance launch
        if: steps.check.outputs.skip == 'false'
        run: |
          set +e
          OUT=$(oci compute instance launch \
            --compartment-id "$OCI_CLI_TENANCY" \
            --availability-domain "${{ steps.ad.outputs.name }}" \
            --shape "$SHAPE" \
            --shape-config "{\"ocpus\": $OCPUS, \"memoryInGBs\": $MEMORY_GBS}" \
            --subnet-id "$OCI_SUBNET_ID" \
            --image-id "${{ steps.image.outputs.id }}" \
            --assign-public-ip true \
            --display-name "$INSTANCE_DISPLAY_NAME" \
            --ssh-authorized-keys-file <(echo "$OCI_SSH_PUBLIC_KEY") \
            --wait-for-state RUNNING --max-wait-seconds 120 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "✅ Instance created successfully!"
            exit 0
          fi
          if echo "$OUT" | grep -qi "Out of host capacity\|Out of capacity"; then
            echo "⏳ Still out of capacity, will retry on next scheduled run."
            exit 0
          fi
          echo "❌ Unexpected error launching instance."
          exit 1
