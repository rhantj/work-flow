name: Deploy to OCI

on:
  push:
    branches: [main]

concurrency:
  group: deploy-oci
  cancel-in-progress: false

jobs:
  # 배포 전 게이트. 이 잡이 없던 동안 main push는 빌드·테스트 없이 곧바로 운영에
  # 반영됐고, 컨텍스트 기동 실패가 운영에서야 드러났다(2026-07-23 장애).
  # deploy가 이 잡에 의존하므로, 컨텍스트가 뜨지 않는 코드는 서버에 도달할 수 없다.
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: App/backend_spring
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run backend tests
        run: ./gradlew test --no-daemon

      # Docker가 없으면 조용히 건너뛰는 테스트다. 배포 게이트에서 건너뛰면 의미가 없다.
      - name: Verify context load test actually ran
        run: python3 ci/verify-context-test-ran.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/oci_deploy_key
          chmod 600 ~/.ssh/oci_deploy_key
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Preflight Redis ACL environment without changing services
        run: |
          ssh -i ~/.ssh/oci_deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -e
            cd /home/ubuntu/work-flow/App
            test -f .env
            read_env_value() {
              key="$1"
              sed -n "s/^${key}=//p" .env | tail -n 1
            }
            validate_redis_password() {
              key="$1"
              value="$2"
              if [ "${#value}" -lt 32 ] || [ "${#value}" -gt 128 ]; then
                echo "Redis ACL password preflight failed: ${key} length must be 32..128"
                exit 1
              fi
              case "$value" in
                *[!A-Za-z0-9_-]*)
                  echo "Redis ACL password preflight failed: ${key} contains unsupported characters"
                  exit 1
                  ;;
              esac
            }
            redis_admin_password=$(read_env_value REDIS_ADMIN_PASSWORD)
            redis_spring_password=$(read_env_value REDIS_SPRING_PASSWORD)
            redis_fastapi_password=$(read_env_value REDIS_FASTAPI_PASSWORD)
            validate_redis_password REDIS_ADMIN_PASSWORD "$redis_admin_password"
            validate_redis_password REDIS_SPRING_PASSWORD "$redis_spring_password"
            validate_redis_password REDIS_FASTAPI_PASSWORD "$redis_fastapi_password"
            if [ "$redis_admin_password" = "$redis_spring_password" ] \
              || [ "$redis_admin_password" = "$redis_fastapi_password" ] \
              || [ "$redis_spring_password" = "$redis_fastapi_password" ]; then
              echo "Redis ACL passwords must be distinct"
              exit 1
            fi
            unset redis_admin_password redis_spring_password redis_fastapi_password

            spring_jdbc_url=$(read_env_value SPRING_DATASOURCE_URL)
            spring_db_user=$(read_env_value SPRING_DATASOURCE_USERNAME)
            spring_db_password=$(read_env_value SPRING_DATASOURCE_PASSWORD)
            spring_jdbc_url=${spring_jdbc_url:-jdbc:postgresql://db:5432/workflow}
            spring_db_user=${spring_db_user:-postgres}
            spring_db_password=${spring_db_password:-$(read_env_value POSTGRES_PASSWORD)}
            test -n "$spring_db_password"
            spring_psql_url=${spring_jdbc_url#jdbc:}
            schema_check_url=$spring_psql_url
            skip_schema_check=0
            case "$spring_psql_url" in
              *://db:*)
                # 운영도 Compose 내부 db 서비스를 쓰므로 이 분기는 항상 참이다. 여기서 무조건
                # 통과시키면 마이그레이션 누락이 서비스 교체 뒤에야 드러나 프리플라이트가 무의미해진다.
                # prod 오버레이가 db를 127.0.0.1:5432에 게시하므로 호스트 주소로 바꿔 같은 검사를 한다.
                if [ "$(docker inspect -f "{{.State.Running}}" workflow-db 2>/dev/null)" = "true" ]; then
                  schema_check_url=${spring_psql_url%%://db:*}://127.0.0.1:${spring_psql_url#*://db:}
                else
                  # 컨테이너가 없는 최초 배포에서는 검사할 DB 자체가 없다. 이 경우에만 기동 후
                  # readiness 단계로 넘긴다.
                  echo "Database container is not running; schema preflight deferred to post-start readiness."
                  skip_schema_check=1
                fi
                ;;
            esac
            if [ "$skip_schema_check" -eq 1 ]; then
              schema_ready=1
            else
              schema_ready=$(docker run --rm --network host \
                -e PGPASSWORD="$spring_db_password" postgres:16-alpine \
                psql "$schema_check_url" -U "$spring_db_user" -tA -v ON_ERROR_STOP=1 \
                -c "SELECT CASE WHEN to_regclass('"'"'public.rag_assignee_sync_failures'"'"') IS NOT NULL AND EXISTS (SELECT 1 FROM information_schema.columns WHERE table_schema='"'"'public'"'"' AND table_name='"'"'meetings'"'"' AND column_name='"'"'analysis_job_id'"'"') THEN 1 ELSE 0 END")
            fi
            unset spring_db_password
            if [ "$schema_ready" != "1" ]; then
              echo "Database schema preflight failed: apply migrations 009 and 010 before deployment."
              exit 1
            fi
          '

      - name: Deploy (git fetch + reset --hard origin/main + docker compose up -d --build)
        id: deploy
        run: |
          ssh -i ~/.ssh/oci_deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -e
            cd /home/ubuntu/work-flow
            git tag -f deploy-previous HEAD
            git fetch origin main
            git reset --hard origin/main
            cd App
            test -f .env
            # Preflight가 성공한 뒤에만 Compose를 검증하고 서비스를 변경한다.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            internal_ready=0
            for attempt in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T redis \
                   sh -c "REDISCLI_AUTH=\"\$REDIS_ADMIN_PASSWORD\" redis-cli --raw --user admin ping" \
                   2>/dev/null | grep -qx PONG \
                && curl -fsS -m 10 http://127.0.0.1:8000/api/v1/health >/dev/null \
                && curl -fsS -m 10 http://127.0.0.1:8080/api/v1/health/ready >/dev/null \
                && docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T redis \
                   sh -c "REDISCLI_AUTH=\"\$REDIS_ADMIN_PASSWORD\" redis-cli --raw --user admin XINFO GROUPS meeting-analysis" \
                   2>/dev/null | grep -qx meeting-analysis-workers; then
                echo "OCI internal Redis/FastAPI/Spring/queue readiness passed (attempt ${attempt})"
                internal_ready=1
                break
              fi
              echo "OCI internal readiness pending (attempt ${attempt})"
              sleep 5
            done
            if [ "$internal_ready" -ne 1 ]; then
              echo "OCI internal readiness failed"
              exit 1
            fi
          '

      - name: Health check
        id: health_check
        if: steps.deploy.outcome == 'success'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -m 10 -o /dev/null -w '%{http_code}' "https://${{ secrets.OCI_DOMAIN }}/api/v1/health/ready" || echo 000)
            if [ "$code" = "200" ]; then
              echo "healthy (attempt $i)"
              exit 0
            fi
            echo "not healthy yet (attempt $i, code=$code) — retrying in 10s"
            sleep 10
          done
          echo "health check failed after retries"
          exit 1

      # deploy-previous는 "직전 배포본"이지 "마지막 정상본"이 아니다. 배포가 연달아
      # 실패하면 고장난 커밋을 가리키게 되고, 롤백이 고장난 버전으로 되돌린다.
      # 실제로 2026-07-23 장애 직후 deploy-previous가 크래시 루프 커밋을 가리키고 있었다.
      # 헬스체크를 통과한 시점에만 별도 태그를 찍어 진짜 롤백 지점으로 삼는다.
      - name: Mark last known good revision
        if: steps.health_check.outcome == 'success'
        run: |
          ssh -i ~/.ssh/oci_deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -e
            cd /home/ubuntu/work-flow
            git tag -f deploy-last-good HEAD
            echo "deploy-last-good -> $(git rev-parse --short HEAD)"
          '

      - name: Clean up unused Docker cache
        if: steps.health_check.outcome == 'success'
        run: |
          ssh -i ~/.ssh/oci_deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            docker image prune -f
            docker builder prune -f
          '

      - name: Rollback to previous commit on deploy or health check failure
        id: rollback
        if: always() && (steps.deploy.outcome == 'failure' || steps.health_check.outcome == 'failure')
        run: |
          ssh -i ~/.ssh/oci_deploy_key "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -e
            cd /home/ubuntu/work-flow/App
            spring_jdbc_url=$(docker inspect workflow-backend-spring \
              --format "{{range .Config.Env}}{{println .}}{{end}}" \
              | sed -n "s/^SPRING_DATASOURCE_URL=//p" | tail -n 1)
            spring_db_user=$(docker inspect workflow-backend-spring \
              --format "{{range .Config.Env}}{{println .}}{{end}}" \
              | sed -n "s/^SPRING_DATASOURCE_USERNAME=//p" | tail -n 1)
            spring_db_password=$(docker inspect workflow-backend-spring \
              --format "{{range .Config.Env}}{{println .}}{{end}}" \
              | sed -n "s/^SPRING_DATASOURCE_PASSWORD=//p" | tail -n 1)
            # $name/$_는 Go 템플릿 변수다. 이스케이프하지 않으면 원격 셸이 먼저 빈 문자열로
            # 치환해 "unexpected , in range" 템플릿 오류가 나고 spring_network가 비어버린다.
            spring_network=$(docker inspect workflow-backend-spring \
              --format "{{range \$name, \$_ := .NetworkSettings.Networks}}{{println \$name}}{{end}}" \
              | sed -n "1p")
            if docker ps -a --format "{{.Names}}" | grep -qx workflow-backend-spring; then
              spring_running=$(docker inspect --format "{{.State.Running}}" workflow-backend-spring)
              if [ "$spring_running" = "true" ]; then
                docker stop --time 60 workflow-backend-spring
              elif [ "$spring_running" != "false" ]; then
                echo "Automatic rollback blocked: unable to quiesce Spring; manual intervention required."
                exit 1
              fi
            fi
            queue_length=unavailable
            queue_pending=unavailable
            queue_length=$(docker exec workflow-redis \
              sh -c "REDISCLI_AUTH=\"\$REDIS_ADMIN_PASSWORD\" redis-cli --raw --user admin XLEN meeting-analysis" \
              2>/dev/null || printf unavailable)
            queue_pending=$(docker exec workflow-redis \
              sh -c "REDISCLI_AUTH=\"\$REDIS_ADMIN_PASSWORD\" redis-cli --raw --user admin XPENDING meeting-analysis meeting-analysis-workers" \
              2>/dev/null | sed -n "1p" || printf unavailable)
            rag_outbox_count=unavailable
            spring_psql_url=${spring_jdbc_url#jdbc:}
            if outbox_query_result=$(docker run --rm --network "$spring_network" \
              -e PGPASSWORD="$spring_db_password" postgres:16-alpine \
              psql "$spring_psql_url" -U "$spring_db_user" -tA -v ON_ERROR_STOP=1 \
              -c "SELECT source_type FROM rag_assignee_sync_failures" \
              2>/dev/null); then
              # 작은따옴표 금지: 이 블록 전체가 ssh에 작은따옴표로 넘어가므로 안쪽 작은따옴표가
              # 바깥 인용을 닫아버려 괄호가 노출되고 러너에서 bash 문법 오류로 죽는다.
              rag_outbox_count=$(printf "%s\n" "$outbox_query_result" \
                | grep -Ec "^(delete:|delete_project|sync:|ingest:)") || rag_outbox_count=0
            fi
            unset spring_db_password outbox_query_result
            [ -n "$queue_length" ] || queue_length=unavailable
            [ -n "$queue_pending" ] || queue_pending=unavailable
            echo "Rollback safety metrics: queue_length=${queue_length}, queue_pending=${queue_pending}, rag_outbox=${rag_outbox_count}"
            echo "WARNING: 이전 코드는 Redis Stream을 drain할 수 없습니다. 처리 중 작업은 운영자가 확인해야 합니다."
            echo "WARNING: 이전 코드는 새 RAG 삭제/담당자/인제스트 outbox를 재처리할 수 없습니다."

            if ! printf "%s\n" "$queue_length" | grep -Eq "^[0-9]+$" \
              || ! printf "%s\n" "$queue_pending" | grep -Eq "^[0-9]+$" \
              || ! printf "%s\n" "$rag_outbox_count" | grep -Eq "^[0-9]+$"; then
              echo "Automatic rollback blocked: queue/outbox metrics unavailable or non-numeric; manual drain/compensation required."
              exit 1
            fi
            if [ "$queue_length" -ne 0 ] || [ "$queue_pending" -ne 0 ] || [ "$rag_outbox_count" -ne 0 ]; then
              echo "Automatic rollback blocked: queue or RAG outbox is not drained; manual drain/compensation required."
              exit 1
            fi

            cd ..
            # 롤백 대상은 헬스체크를 통과한 적이 있는 커밋(deploy-last-good)뿐이다.
            # deploy-previous는 "직전 배포본"일 뿐 정상 동작이 확인된 적이 없어, 실패한
            # 배포가 남긴 고장난 커밋일 수 있다(2026-07-23 장애 직후 실제로 그랬다).
            # 폴백하지 않고 차단한다. 자동 롤백이 없는 것보다 고장난 버전으로 되돌리는
            # 쪽이 더 위험하다.
            rollback_target=deploy-last-good
            if ! git rev-parse -q --verify "${rollback_target}^{commit}" >/dev/null; then
              echo "Automatic rollback blocked: deploy-last-good 태그가 없습니다."
              echo "정상 동작이 확인된 롤백 지점이 없으므로 자동 롤백을 중단합니다. 수동 개입이 필요합니다."
              exit 1
            fi
            echo "rolling back to $(git rev-parse "$rollback_target") (${rollback_target})"
            git reset --hard "$rollback_target"
            cd App
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          '

      - name: Verify rollback health
        if: always() && steps.rollback.outcome == 'success'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -m 10 -o /dev/null -w '%{http_code}' "https://${{ secrets.OCI_DOMAIN }}/api/v1/health" || echo 000)
            if [ "$code" = "200" ]; then
              echo "rollback restored healthy state (attempt $i)"
              exit 0
            fi
            echo "still not healthy after rollback (attempt $i, code=$code) — retrying in 10s"
            sleep 10
          done
          echo "rollback did NOT restore a healthy state — manual intervention required immediately"
          exit 1

      - name: Notify Slack on deploy failure
        if: always() && (steps.deploy.outcome == 'failure' || steps.health_check.outcome == 'failure')
        run: |
          curl -s -m 10 -X POST -H 'Content-Type: application/json' \
            -d "{\"text\": \":rotating_light: OCI 배포 실패 (run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) — rollback outcome: ${{ steps.rollback.outcome }}. 롤백 후에도 비정상이면 즉시 수동 개입 필요.\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
